{% extends "base.html" %}
{% block title %}Login — Stay Covered CRM{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="text-3xl font-bold text-brand">Stay Covered</div>
      <div class="text-gray-500 text-sm mt-1">Painel de Atendimento</div>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-6 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
        <input type="text" name="username" required autofocus
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent" />
      </div>
      <button type="submit"
        class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
        Entrar
      </button>
    </form>

  </div>
</div>
{% endblock %}
